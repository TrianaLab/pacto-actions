name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error

  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6.0.2

      # Install pacto directly from the release download URL instead of using
      # the action's `setup` command, because the upstream install script
      # makes unauthenticated api.github.com calls that get rate-limited on
      # shared macOS runner IPs. Releases download URLs are not API-rate-limited.
      - name: Install pacto
        env:
          PACTO_VERSION: v1.3.2
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64|amd64) arch=amd64 ;;
            aarch64|arm64) arch=arm64 ;;
            *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          os="$(uname | tr '[:upper:]' '[:lower:]')"
          url="https://github.com/TrianaLab/pacto/releases/download/${PACTO_VERSION}/pacto_${os}_${arch}"
          curl -fsSL -o /tmp/pacto "$url"
          chmod +x /tmp/pacto
          sudo mv /tmp/pacto /usr/local/bin/pacto
          pacto version

      - name: Create fixture contract
        run: |
          mkdir -p contract
          cat > contract/pacto.yaml <<'EOF'
          pactoVersion: "1.0"
          service:
            name: smoke-test
            version: 1.0.0
          EOF

      - name: Validate contract
        uses: ./
        with:
          command: validate
          path: contract

      - name: Generate doc
        uses: ./
        with:
          command: doc
          path: contract
          add-to-summary: 'false'

      - name: Diff contract against itself
        id: diff
        uses: ./
        with:
          command: diff
          old: contract
          new: contract
          fail-on-breaking: 'true'

      - name: Verify no breaking changes detected
        run: |
          if [ "${{ steps.diff.outputs.has-breaking-changes }}" != "false" ]; then
            echo "::error::Expected has-breaking-changes=false, got '${{ steps.diff.outputs.has-breaking-changes }}'"
            exit 1
          fi
