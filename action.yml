name: 'Pacto CLI'
description: 'Setup, diff, push, and generate documentation for Pacto contracts in your GitHub Actions workflows'
author: 'TrianaLab'

branding:
  icon: 'feather'
  color: 'blue'

inputs:
  command:
    description: 'Command to run: "setup", "validate", "diff", "push", or "doc"'
    required: true
  # setup inputs
  version:
    description: '[setup] Pacto version to install (e.g., v0.2.1)'
    required: false
    default: 'latest'
  github-token:
    description: 'GitHub token passed as GH_TOKEN to all commands'
    required: false
    default: ${{ github.token }}
  # cache inputs
  cache:
    description: 'Enable OCI bundle caching across workflow runs (uses ~/.cache/pacto/oci/)'
    required: false
    default: 'true'
  # diff inputs
  old:
    description: '[diff] Baseline contract: directory path or oci:// reference'
    required: false
  new:
    description: '[diff] Updated contract: directory path or oci:// reference'
    required: false
  output-format:
    description: '[diff] Output format: "text", "json", or "markdown"'
    required: false
    default: 'text'
  fail-on-breaking:
    description: '[diff] Fail the action if breaking changes are detected'
    required: false
    default: 'true'
  # push inputs
  ref:
    description: '[push] OCI reference (e.g., oci://ghcr.io/org/name:tag)'
    required: false
  path:
    description: '[validate/push/doc] Path to the contract directory or oci:// reference'
    required: false
    default: '.'
  registry:
    description: '[push] Registry hostname for authentication (e.g., ghcr.io)'
    required: false
  username:
    description: '[push] Registry username for authentication'
    required: false
  password:
    description: '[push] Registry password or token for authentication'
    required: false
  # doc inputs
  output-path:
    description: '[doc] File path to save the generated markdown documentation'
    required: false
  comment-on-pr:
    description: '[diff/doc] Post the output as a PR comment'
    required: false
    default: 'false'
  add-to-summary:
    description: '[doc] Add the documentation to the GitHub Step Summary'
    required: false
    default: 'true'

outputs:
  version:
    description: '[setup] The exact version of Pacto that was installed'
    value: ${{ steps.setup.outputs.version }}
  has-breaking-changes:
    description: '[diff] Whether breaking changes were detected ("true" or "false")'
    value: ${{ steps.diff.outputs.has-breaking-changes }}
  diff-output:
    description: '[diff] The full diff output'
    value: ${{ steps.diff.outputs.diff-output }}
  doc-output:
    description: '[doc] The generated markdown documentation'
    value: ${{ steps.doc.outputs.doc-output }}

runs:
  using: 'composite'
  steps:
    - name: Validate command
      shell: bash
      env:
        COMMAND: ${{ inputs.command }}
      run: |
        case "${COMMAND}" in
          setup|validate|diff|push|doc) ;;
          *)
            echo "::error::Invalid command '${COMMAND}'. Must be one of: setup, validate, diff, push, doc"
            exit 1
            ;;
        esac

    # ── Setup ──────────────────────────────────────────────
    - name: Install Pacto
      if: inputs.command == 'setup'
      id: setup
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        # Build install script arguments
        ARGS="--no-sudo"
        if [ "${VERSION}" != "latest" ]; then
          ARGS="${ARGS} --version ${VERSION}"
        fi

        # Install using the official install script
        curl -fsSL https://raw.githubusercontent.com/TrianaLab/pacto/main/scripts/get-pacto.sh | bash -s -- ${ARGS}

        # Capture installed version
        INSTALLED_VERSION=$(pacto version 2>&1 | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "${VERSION}")
        echo "version=${INSTALLED_VERSION}" >> "${GITHUB_OUTPUT}"
        echo "Pacto ${INSTALLED_VERSION} installed successfully"

    # ── Cache ──────────────────────────────────────────────
    - name: Restore OCI bundle cache
      if: inputs.command != 'setup' && inputs.cache == 'true'
      uses: actions/cache@v5.0.3
      with:
        path: ~/.cache/pacto/oci/
        key: pacto-oci-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          pacto-oci-${{ runner.os }}-

    # ── Validate ───────────────────────────────────────────
    - name: Validate contract
      if: inputs.command == 'validate'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        CONTRACT_PATH: ${{ inputs.path }}
        PACTO_NO_CACHE: ${{ inputs.cache == 'true' && '0' || '1' }}
      run: |
        set -euo pipefail
        pacto validate "${CONTRACT_PATH}"

    # ── Diff ───────────────────────────────────────────────
    - name: Validate diff inputs
      if: inputs.command == 'diff'
      shell: bash
      env:
        OLD_REF: ${{ inputs.old }}
        NEW_REF: ${{ inputs.new }}
      run: |
        if [ -z "${OLD_REF}" ] || [ -z "${NEW_REF}" ]; then
          echo "::error::Both 'old' and 'new' inputs are required for the diff command"
          exit 1
        fi

    - name: Run pacto diff
      if: inputs.command == 'diff'
      id: diff
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        OLD_REF: ${{ inputs.old }}
        NEW_REF: ${{ inputs.new }}
        OUTPUT_FORMAT: ${{ inputs.output-format }}
        FAIL_ON_BREAKING: ${{ inputs.fail-on-breaking }}
        PACTO_NO_CACHE: ${{ inputs.cache == 'true' && '0' || '1' }}
      run: |
        set +e
        OUTPUT=$(pacto diff "${OLD_REF}" "${NEW_REF}" --output-format "${OUTPUT_FORMAT}" 2>&1)
        EXIT_CODE=$?
        set -e

        # Set outputs using heredoc delimiter for multiline safety
        {
          echo "diff-output<<PACTO_DIFF_EOF"
          echo "${OUTPUT}"
          echo "PACTO_DIFF_EOF"
        } >> "${GITHUB_OUTPUT}"

        # Write to step summary
        {
          echo "## Pacto Diff Results"
          echo ""
          if [ "${OUTPUT_FORMAT}" = "markdown" ]; then
            echo "${OUTPUT}"
          else
            echo '```'
            echo "${OUTPUT}"
            echo '```'
          fi
        } >> "${GITHUB_STEP_SUMMARY}"

        echo "${OUTPUT}"

        if [ ${EXIT_CODE} -ne 0 ]; then
          echo "has-breaking-changes=true" >> "${GITHUB_OUTPUT}"
          if [ "${FAIL_ON_BREAKING}" = "true" ]; then
            echo "::error::Breaking changes detected between contracts"
            exit 1
          fi
          echo "::warning::Breaking changes detected between contracts"
        else
          echo "has-breaking-changes=false" >> "${GITHUB_OUTPUT}"
        fi

    - name: Comment diff on PR
      if: always() && inputs.command == 'diff' && inputs.comment-on-pr == 'true' && steps.diff.outcome != 'skipped'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        EVENT_NAME: ${{ github.event_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        DIFF_OUTPUT: ${{ steps.diff.outputs.diff-output }}
        HAS_BREAKING: ${{ steps.diff.outputs.has-breaking-changes }}
        NEW_REF: ${{ inputs.new }}
        OUTPUT_FORMAT: ${{ inputs.output-format }}
      run: |
        set -euo pipefail

        # Determine PR number
        if [ "${EVENT_NAME}" = "pull_request" ] || [ "${EVENT_NAME}" = "pull_request_target" ]; then
          RESOLVED_PR="${PR_NUMBER}"
        else
          echo "::warning::comment-on-pr is enabled but this is not a pull request event (event: ${EVENT_NAME}). Skipping comment."
          exit 0
        fi

        if [ -z "${RESOLVED_PR}" ]; then
          echo "::warning::Could not determine pull request number. Skipping comment."
          exit 0
        fi

        MARKER="<!-- pacto-diff-comment:${NEW_REF} -->"

        # Write body to temp file for safe multiline handling
        BODY_FILE=$(mktemp)
        {
          echo "${MARKER}"
          if [ "${HAS_BREAKING}" = "true" ]; then
            echo "## ⚠️ Pacto Diff — Breaking Changes Detected"
          else
            echo "## ✅ Pacto Diff — No Breaking Changes"
          fi
          echo ""
          if [ "${OUTPUT_FORMAT}" = "markdown" ]; then
            echo "${DIFF_OUTPUT}"
          else
            echo '```'
            echo "${DIFF_OUTPUT}"
            echo '```'
          fi
        } > "${BODY_FILE}"

        # Search for existing comment with marker
        EXISTING_COMMENT_ID=$(gh api \
          --paginate \
          "repos/${REPO}/issues/${RESOLVED_PR}/comments" \
          --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
          | head -1)

        if [ -n "${EXISTING_COMMENT_ID}" ]; then
          # Update existing comment
          gh api \
            --method PATCH \
            "repos/${REPO}/issues/comments/${EXISTING_COMMENT_ID}" \
            -F body=@"${BODY_FILE}"
          echo "Updated existing PR comment (id: ${EXISTING_COMMENT_ID})"
        else
          # Create new comment
          gh api \
            --method POST \
            "repos/${REPO}/issues/${RESOLVED_PR}/comments" \
            -F body=@"${BODY_FILE}"
          echo "Created new PR comment"
        fi

        rm -f "${BODY_FILE}"

    # ── Push ───────────────────────────────────────────────
    - name: Validate push inputs
      if: inputs.command == 'push'
      shell: bash
      env:
        REF: ${{ inputs.ref }}
        REGISTRY: ${{ inputs.registry }}
        USERNAME: ${{ inputs.username }}
        PASSWORD: ${{ inputs.password }}
      run: |
        if [ -z "${REF}" ]; then
          echo "::error::The 'ref' input is required for the push command"
          exit 1
        fi

        # Validate that auth inputs are either all provided or all omitted
        AUTH_COUNT=0
        [ -n "${REGISTRY}" ] && AUTH_COUNT=$((AUTH_COUNT + 1))
        [ -n "${USERNAME}" ] && AUTH_COUNT=$((AUTH_COUNT + 1))
        [ -n "${PASSWORD}" ] && AUTH_COUNT=$((AUTH_COUNT + 1))
        if [ "${AUTH_COUNT}" -ne 0 ] && [ "${AUTH_COUNT}" -ne 3 ]; then
          echo "::error::All three inputs (registry, username, password) must be provided together for authentication"
          exit 1
        fi

    - name: Authenticate with registry
      if: inputs.command == 'push' && inputs.registry != '' && inputs.username != '' && inputs.password != ''
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        USERNAME: ${{ inputs.username }}
        PASSWORD: ${{ inputs.password }}
      run: |
        set -euo pipefail
        echo "::add-mask::${PASSWORD}"
        pacto login "${REGISTRY}" -u "${USERNAME}" -p "${PASSWORD}"

    - name: Push contract
      if: inputs.command == 'push'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REF: ${{ inputs.ref }}
        CONTRACT_PATH: ${{ inputs.path }}
        PACTO_NO_CACHE: ${{ inputs.cache == 'true' && '0' || '1' }}
      run: |
        set -euo pipefail
        echo "Pushing contract to ${REF}..."
        pacto push "${REF}" -p "${CONTRACT_PATH}"
        echo "Contract pushed successfully to ${REF}"

    # ── Doc ────────────────────────────────────────────────
    - name: Generate documentation
      if: inputs.command == 'doc'
      id: doc
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        CONTRACT_PATH: ${{ inputs.path }}
        OUTPUT_PATH: ${{ inputs.output-path }}
        ADD_TO_SUMMARY: ${{ inputs.add-to-summary }}
        PACTO_NO_CACHE: ${{ inputs.cache == 'true' && '0' || '1' }}
      run: |
        set -euo pipefail

        OUTPUT=$(pacto doc "${CONTRACT_PATH}")

        # Set output using heredoc delimiter for multiline safety
        {
          echo "doc-output<<PACTO_DOC_EOF"
          echo "${OUTPUT}"
          echo "PACTO_DOC_EOF"
        } >> "${GITHUB_OUTPUT}"

        # Write to file if output-path is set
        if [ -n "${OUTPUT_PATH}" ]; then
          mkdir -p "$(dirname "${OUTPUT_PATH}")"
          echo "${OUTPUT}" > "${OUTPUT_PATH}"
          echo "Documentation written to ${OUTPUT_PATH}"
        fi

        # Write to step summary if enabled
        if [ "${ADD_TO_SUMMARY}" = "true" ]; then
          echo "${OUTPUT}" >> "${GITHUB_STEP_SUMMARY}"
        fi

        echo "${OUTPUT}"

    - name: Comment documentation on PR
      if: inputs.command == 'doc' && inputs.comment-on-pr == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        EVENT_NAME: ${{ github.event_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        DOC_OUTPUT: ${{ steps.doc.outputs.doc-output }}
        CONTRACT_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail

        # Determine PR number
        if [ "${EVENT_NAME}" = "pull_request" ] || [ "${EVENT_NAME}" = "pull_request_target" ]; then
          RESOLVED_PR="${PR_NUMBER}"
        else
          echo "::warning::comment-on-pr is enabled but this is not a pull request event (event: ${EVENT_NAME}). Skipping comment."
          exit 0
        fi

        if [ -z "${RESOLVED_PR}" ]; then
          echo "::warning::Could not determine pull request number. Skipping comment."
          exit 0
        fi

        MARKER="<!-- pacto-doc-comment:${CONTRACT_PATH} -->"

        # Write body to temp file for safe multiline handling
        BODY_FILE=$(mktemp)
        {
          echo "${MARKER}"
          echo "## Pacto Contract Documentation"
          echo ""
          echo "${DOC_OUTPUT}"
        } > "${BODY_FILE}"

        # Search for existing comment with marker
        EXISTING_COMMENT_ID=$(gh api \
          --paginate \
          "repos/${REPO}/issues/${RESOLVED_PR}/comments" \
          --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
          | head -1)

        if [ -n "${EXISTING_COMMENT_ID}" ]; then
          # Update existing comment
          gh api \
            --method PATCH \
            "repos/${REPO}/issues/comments/${EXISTING_COMMENT_ID}" \
            -F body=@"${BODY_FILE}"
          echo "Updated existing PR comment (id: ${EXISTING_COMMENT_ID})"
        else
          # Create new comment
          gh api \
            --method POST \
            "repos/${REPO}/issues/${RESOLVED_PR}/comments" \
            -F body=@"${BODY_FILE}"
          echo "Created new PR comment"
        fi

        rm -f "${BODY_FILE}"
